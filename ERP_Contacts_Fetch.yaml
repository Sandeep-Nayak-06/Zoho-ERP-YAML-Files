openapi: 3.0.3

info:
  title: Zoho ERP Contacts API
  version: "1.0.0"
  description: Retrieve contacts from Zoho ERP.

servers:
  - url: https://www.zohoapis.in/erp/v3

paths:
  /contacts:
    get:
      operationId: listContacts
      summary: List Contacts
      description: Returns a paginated list of contacts from Zoho ERP.

      tags:
        - Contacts

      x-zoho-oauth:
        connection: erpcontactsscope
        scopes:
          - ERP.contacts.READ

      security:
        - OAuth2:
            - ERP.contacts.READ

      parameters:
        - name: organization_id
          in: query
          required: true
          description: Zoho ERP Organization ID.
          schema:
            type: string
            default: "60076965886"

        - name: page
          in: query
          description: Page number.
          schema:
            type: integer
            default: 1

        - name: per_page
          in: query
          description: Number of records per page.
          schema:
            type: integer
            default: 200

        - name: contact_name
          in: query
          description: Filter by contact name.
          schema:
            type: string

        - name: email
          in: query
          description: Filter by email address.
          schema:
            type: string

        - name: phone
          in: query
          description: Filter by phone number.
          schema:
            type: string

        - name: contact_type
          in: query
          description: Contact type.
          schema:
            type: string
            enum:
              - customer
              - vendor

        - name: sort_column
          in: query
          description: Field to sort by.
          schema:
            type: string
            enum:
              - contact_name
              - created_time
              - last_modified_time

        - name: sort_order
          in: query
          description: Sort direction.
          schema:
            type: string
            enum:
              - A
              - D

      responses:
        "200":
          description: Contacts retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0

                  message:
                    type: string
                    example: success

                  page_context:
                    type: object
                    properties:
                      page:
                        type: integer
                      per_page:
                        type: integer
                      has_more_page:
                        type: boolean
                      report_name:
                        type: string

                  contacts:
                    type: array
                    items:
                      type: object
                      properties:
                        contact_id:
                          type: string
                        contact_name:
                          type: string
                        company_name:
                          type: string
                        contact_type:
                          type: string
                        email:
                          type: string
                        phone:
                          type: string
                        mobile:
                          type: string
                        status:
                          type: string
                        currency_code:
                          type: string
                        outstanding_receivable_amount:
                          type: number
                          format: double
                        outstanding_payable_amount:
                          type: number
                          format: double
                        created_time:
                          type: string
                          format: date-time

        "400":
          description: Invalid request.

        "401":
          description: Unauthorized.

        "500":
          description: Internal server error.

components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.zoho.in/oauth/v2/auth
          tokenUrl: https://accounts.zoho.in/oauth/v2/token
          scopes:
            ERP.contacts.READ: Read Contacts
            ERP.contacts.CREATE: Create Contacts
            ERP.contacts.UPDATE: Update Contacts
            ERP.contacts.DELETE: Delete Contacts
