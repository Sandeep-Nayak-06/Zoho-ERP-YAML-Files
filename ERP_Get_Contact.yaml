openapi: 3.0.3

info:
  title: Zoho ERP Contacts API
  version: "1.0.0"
  description: Retrieve a contact from Zoho ERP using its Contact ID.

servers:
  - url: https://www.zohoapis.in

paths:
  /erp/v3/contacts/{contact_id}:
    get:
      operationId: getContact
      summary: Get Contact
      description: Retrieves the complete details of a contact from Zoho ERP.

      x-zoho-oauth:
        connection: erpcontactsscope
        scopes:
          - ERP.contacts.READ

      security:
        - OAuth2:
            - ERP.contacts.READ

      parameters:
        - name: contact_id
          in: path
          required: true
          description: Unique identifier of the contact.
          schema:
            type: string
            example: "3949247000000061001"

        - name: organization_id
          in: query
          required: true
          description: Zoho ERP Organization ID.
          schema:
            type: string
            default: "60076965886"

      responses:
        "200":
          description: Contact retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0

                  message:
                    type: string
                    example: success

                  contact:
                    type: object
                    properties:
                      contact_id:
                        type: string
                      contact_name:
                        type: string
                      company_name:
                        type: string
                      contact_type:
                        type: string
                      customer_sub_type:
                        type: string
                      first_name:
                        type: string
                      last_name:
                        type: string
                      email:
                        type: string
                      phone:
                        type: string
                      mobile:
                        type: string
                      website:
                        type: string
                      status:
                        type: string
                      currency_code:
                        type: string
                      payment_terms:
                        type: integer
                      outstanding_receivable_amount:
                        type: number
                        format: double
                      outstanding_payable_amount:
                        type: number
                        format: double
                      billing_address:
                        type: object
                        additionalProperties: true
                      shipping_address:
                        type: object
                        additionalProperties: true
                      contact_persons:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      custom_fields:
                        type: array
                        items:
                          type: object
                          additionalProperties: true
                      created_time:
                        type: string
                        format: date-time
                      last_modified_time:
                        type: string
                        format: date-time

        "400":
          description: Invalid request.

        "401":
          description: Unauthorized.

        "404":
          description: Contact not found.

components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.zoho.in/oauth/v2/auth
          tokenUrl: https://accounts.zoho.in/oauth/v2/token
          scopes:
            ERP.contacts.READ: Read Contacts
            ERP.contacts.CREATE: Create Contacts
            ERP.contacts.UPDATE: Update Contacts
            ERP.contacts.DELETE: Delete Contacts
